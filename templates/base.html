<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SMART_HIRE{% endblock %}</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .navbar {
            background-color: white;
            border-bottom: 1px solid var(--border-color);
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg py-3 sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary brand-logo d-flex align-items-center" href="/">
                <i data-lucide="zap" class="me-2"></i>SMART_HIRE
            </a>
            <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item">
                        <a class="nav-link px-3 fw-medium" href="/">For Candidates</a>
                    </li>
                    <li class="nav-item ms-lg-2">
                        {% if current_user.is_authenticated %}
                            <div class="dropdown">
                                <button class="btn btn-primary d-flex align-items-center dropdown-toggle" type="button" data-bs-toggle="dropdown">
                                    <i data-lucide="building" class="me-2" style="width: 18px;"></i> {{ current_user.company_name }}
                                </button>
                                <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-2">
                                    <li><a class="dropdown-item" href="{{ url_for('company_dashboard') }}">Dashboard</a></li>
                                    <li><a class="dropdown-item" href="{{ url_for('add_job') }}">Post Job</a></li>
                                    <li><hr class="dropdown-divider"></li>
                                    <li><a class="dropdown-item text-danger" href="{{ url_for('logout') }}">Logout</a></li>
                                </ul>
                            </div>
                        {% else %}
                            <a class="btn btn-outline-primary px-4 hover-lift" href="{{ url_for('login') }}">Company Login</a>
                        {% endif %}
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="py-5 bg-white border-top mt-auto">
        <div class="container">
            <div class="text-center text-muted small">
                © 2026 SMART_HIRE. All rights reserved.
            </div>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Initialize Lucide icons
        lucide.createIcons();
    </script>
</body>
</html>
